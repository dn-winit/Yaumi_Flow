upstream data_import    { server data-import:8005; }
upstream forecast       { server forecast:8002; }
upstream orders         { server orders:8001; }
upstream supervision    { server supervision:8004; }
upstream analytics      { server analytics:8003; }

server {
    listen 80;
    server_name _;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API routing -- single entry point, nginx routes to correct service
    location /api/v1/data/ {
        proxy_pass http://data_import/api/v1/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /api/v1/forecast/ {
        proxy_pass http://forecast/api/v1/forecast/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /api/v1/recommended-order/ {
        proxy_pass http://orders/api/v1/recommended-order/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /api/v1/supervision/ {
        proxy_pass http://supervision/api/v1/supervision/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /api/v1/analytics/ {
        proxy_pass http://analytics/api/v1/analytics/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
}
